  <text x="84" y="144" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Private internal analytics tool</text>
  <text x="84" y="196" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="20">Raw operational files become validated, structured datasets ready for Power BI and faster decision-making.</text>

