  <text x="118" y="600" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Created a cleaner path from messy source files to analytics consumption</text>
  <text x="118" y="634" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Supported more reliable reporting, validation, and operational reviews</text>
