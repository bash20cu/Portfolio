  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="1030" cy="140" r="150" fill="#22D3EE" fill-opacity="0.08"/>
  <circle cx="170" cy="640" r="180" fill="#A3E635" fill-opacity="0.06"/>
