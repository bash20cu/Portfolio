  <text x="652" y="370" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Consistent metric models</text>

  <rect x="916" y="250" width="200" height="140" rx="28" fill="url(#card)" stroke="#334155"/>
  <text x="946" y="302" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Output</text>
  <text x="946" y="340" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Structured tables</text>
  <text x="946" y="370" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Power BI ready</text>

  <path d="M304 320H348" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M578 320H622" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
