  <rect x="84" y="468" width="1032" height="184" rx="30" fill="#0F172A" stroke="#334155"/>
  <text x="118" y="522" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">What this system improved</text>
