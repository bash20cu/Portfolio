  <text x="114" y="370" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Manual exports</text>

  <rect x="348" y="250" width="230" height="140" rx="28" fill="url(#card)" stroke="#334155"/>
  <text x="378" y="302" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Extraction</text>
  <text x="378" y="340" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Orchestrated loaders</text>
  <text x="378" y="370" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Format-aware parsing</text>

