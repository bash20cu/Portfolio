<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="120" y1="90" x2="1080" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F2937"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card3" x1="150" y1="200" x2="1000" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#bg3)"/>
  <circle cx="1020" cy="170" r="130" fill="#38BDF8" fill-opacity="0.08"/>
  <text x="84" y="104" fill="#E5EEF8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Presupuesto</text>
  <text x="84" y="144" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Personal finance product with automation and reporting</text>
  <text x="84" y="196" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="20">A modern app to centralize transactions, invoices, budget categories, and reporting in one full-stack workflow.</text>

  <rect x="84" y="262" width="260" height="140" rx="28" fill="url(#card3)" stroke="#3B82F6"/>
  <text x="114" y="312" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Capture</text>
  <text x="114" y="350" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Manual entries</text>
  <text x="114" y="380" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Invoice intake from email</text>

  <rect x="398" y="262" width="260" height="140" rx="28" fill="url(#card3)" stroke="#3B82F6"/>
  <text x="428" y="312" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Core app</text>
  <text x="428" y="350" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Next.js App Router</text>
  <text x="428" y="380" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Auth, actions, validation</text>

  <rect x="712" y="262" width="260" height="140" rx="28" fill="url(#card3)" stroke="#3B82F6"/>
  <text x="742" y="312" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Data layer</text>
  <text x="742" y="350" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">PostgreSQL + Prisma</text>
  <text x="742" y="380" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Clean domain model</text>

  <rect x="272" y="472" width="656" height="170" rx="32" fill="#0F172A" stroke="#334155"/>
  <text x="304" y="526" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">User value</text>
  <text x="304" y="568" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Combines automation, finance workflows, and reporting in a product-shaped experience</text>
  <text x="304" y="602" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Shows full-stack product thinking instead of a disconnected CRUD demo</text>

  <path d="M344 332H398" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
  <path d="M658 332H712" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
